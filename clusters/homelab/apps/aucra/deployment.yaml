apiVersion: v1
kind: Namespace
metadata:
  name: aucra
  labels:
    pod-security.kubernetes.io/enforce: baseline
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aucra-dsp-api
  namespace: aucra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aucra-dsp-api
  template:
    metadata:
      labels:
        app: aucra-dsp-api
    spec:
      containers:
      - name: aucra-dsp-api
        image: aucra/aucra-dsp-api:main
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        envFrom:
        - secretRef:
            name: aucra-secret
        env:
        - name: PORT
          value: "3000"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: aucra-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: aucra-secret
              key: POSTGRES_PASSWORD
        - name: DATABASE_URL
          value: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/dsp?sslmode=disable
---
apiVersion: v1
kind: Service
metadata:
  name: aucra-dsp-api
  namespace: aucra
spec:
  selector:
    app: aucra-dsp-api
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aucra-dsp-api
  namespace: aucra
  annotations:
    tailscale.com/funnel: "true"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: aucra-dsp-api
      port:
        number: 3000
  tls:
  - hosts:
    - aucra-dsp-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aucra-admin-portal
  namespace: aucra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aucra-admin-portal
  template:
    metadata:
      labels:
        app: aucra-admin-portal
    spec:
      containers:
      - name: aucra-admin-portal
        image: aucra/aucra-admin-portal:main
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
          name: http
        envFrom:
        - secretRef:
            name: aucra-secret
        env:
        - name: PORT
          value: "3001"
        - name: SSP_API_URL
          value: http://aucra-ssp-api.aucra.svc.cluster.local:8080
        - name: DSP_API_URL
          value: http://aucra-dsp-api.aucra.svc.cluster.local:3000
        - name: SSP_ADMIN_KEY
          valueFrom:
            secretKeyRef:
              name: aucra-secret
              key: ADMIN_KEY
        - name: DSP_ADMIN_KEY
          valueFrom:
            secretKeyRef:
              name: aucra-secret
              key: ADMIN_KEY
        - name: GOOGLE_CALLBACK_URL
          value: https://aucra-admin-portal.tail9b3001.ts.net/api/auth/google/callback
---
apiVersion: v1
kind: Service
metadata:
  name: aucra-admin-portal
  namespace: aucra
spec:
  selector:
    app: aucra-admin-portal
  ports:
  - port: 3001
    targetPort: 3001
    name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aucra-admin-portal
  namespace: aucra
  annotations:
    tailscale.com/funnel: "true"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: aucra-admin-portal
      port:
        number: 3001
  tls:
  - hosts:
    - aucra-admin-portal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aucra-ssp-api
  namespace: aucra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aucra-ssp-api
  template:
    metadata:
      labels:
        app: aucra-ssp-api
    spec:
      containers:
      - name: aucra-ssp-api
        image: aucra/aucra-ssp-api:main
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        envFrom:
        - secretRef:
            name: aucra-secret
        env:
        - name: PORT
          value: "8080"
        - name: SSP_BASE_URL
          value: http://aucra-ssp-api.aucra.svc.cluster.local:8080
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: aucra-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: aucra-secret
              key: POSTGRES_PASSWORD
        - name: DATABASE_URL
          value: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/ssp?sslmode=disable
---
apiVersion: v1
kind: Service
metadata:
  name: aucra-ssp-api
  namespace: aucra
spec:
  selector:
    app: aucra-ssp-api
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aucra-ssp-api
  namespace: aucra
  annotations:
    tailscale.com/funnel: "true"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: aucra-ssp-api
      port:
        number: 8080
  tls:
  - hosts:
    - aucra-ssp-api
