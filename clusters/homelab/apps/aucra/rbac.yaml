apiVersion: v1
kind: ServiceAccount
metadata:
  name: engineer-access
  namespace: aucra
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: engineer-role
  namespace: aucra
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "replicasets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: engineer-rolebinding
  namespace: aucra
subjects:
- kind: ServiceAccount
  name: engineer-access
  namespace: aucra
roleRef:
  kind: Role
  name: engineer-role
  apiGroup: rbac.authorization.k8s.io